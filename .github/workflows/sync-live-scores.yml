name: Sync Live Scores

on:
  schedule:
    # Every 10 min during WC (Jun–Jul) — runs on GitHub, not Vercel CPU
    - cron: "*/10 * * 6,7 *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-live-scores
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Sync live scores (direct DB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: npx tsx scripts/sync-live-scores.ts
