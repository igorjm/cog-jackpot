name: Sync World Cup Scores

on:
  schedule:
    - cron: "*/10 * * 6,7 *"   # every 10 min in Jun/Jul (UTC)
  workflow_dispatch: {}

concurrency:
  group: sync-scores
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call sync-scores endpoint
        run: |
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync-scores")
          code=$(echo "$response" | tail -n1)
          echo "HTTP $code"; echo "$response" | sed '$d'
          [ "$code" -ge 400 ] && exit 1 || true