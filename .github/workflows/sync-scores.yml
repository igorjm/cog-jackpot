name: Sync World Cup Scores

on:
  schedule:
    - cron: "0 */2 * 6,7 *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-scores
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Sync finished scores (direct DB)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: npx tsx scripts/sync-scores.ts
